<!DOCTYPE html>
<html>
<head>
    <title>PhishDetect Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>🛡️ PhishDetect</h1>
        <h2>Phishing Awareness Quiz</h2>

        <div id="quiz-box">

            <button onclick="checkAnswer('phishing')">Phishing</button>
            <button onclick="checkAnswer('legitimate')">Legitimate</button>

            <p id="result"></p>
        </div>

        <p id="score"></p>
    </div>

    <script src="script.js"></script>

</body>
</html>
